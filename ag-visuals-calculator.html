<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AG Visuals · Pricing Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: #0A0A0C;
    color: #fff;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  .header {
    padding: 40px 24px 28px;
    text-align: center;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    background: linear-gradient(180deg, rgba(255,255,255,0.03) 0%, transparent 100%);
  }
  .header-sub { font-size: 11px; letter-spacing: 0.25em; text-transform: uppercase; color: rgba(255,255,255,0.35); margin-bottom: 8px; font-weight: 500; }
  .header h1 { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 600; letter-spacing: -0.02em; }
  .header-note { font-size: 12px; color: rgba(255,255,255,0.3); margin-top: 6px; }

  /* Tabs */
  .tabs { display: flex; border-bottom: 1px solid rgba(255,255,255,0.06); background: rgba(255,255,255,0.02); }
  .tab-btn {
    flex: 1; padding: 14px 0; border: none; cursor: pointer;
    background: transparent; color: rgba(255,255,255,0.4);
    font-size: 13px; font-weight: 600; font-family: 'DM Sans', sans-serif;
    border-bottom: 2px solid transparent; transition: all 0.2s; letter-spacing: 0.04em;
  }
  .tab-btn.active { background: rgba(255,255,255,0.05); color: #fff; border-bottom-color: #fff; }

  /* Layout */
  .main { display: flex; min-height: calc(100vh - 160px); }
  .services { flex: 1; overflow-y: auto; max-height: calc(100vh - 160px); padding-bottom: 80px; }
  .summary-panel {
    width: 320px; min-width: 280px; border-left: 1px solid rgba(255,255,255,0.06);
    background: rgba(255,255,255,0.02); padding: 24px 20px;
    display: flex; flex-direction: column; position: sticky; top: 0;
    max-height: calc(100vh - 160px); overflow-y: auto;
  }

  /* Section label */
  .section-label {
    font-size: 11px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase;
    color: rgba(255,255,255,0.3); padding: 18px 16px 6px;
  }

  /* Service row */
  .svc-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px; border-radius: 10; transition: background 0.2s;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .svc-row.active { background: rgba(255,255,255,0.04); }
  .svc-name { font-size: 14px; font-weight: 500; color: rgba(255,255,255,0.7); }
  .svc-row.active .svc-name { color: #fff; }
  .svc-price { font-size: 12px; color: rgba(255,255,255,0.35); margin-top: 2px; }

  /* Counter */
  .counter {
    display: flex; align-items: center;
    background: rgba(255,255,255,0.04); border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.08);
  }
  .counter button {
    width: 32px; height: 32px; border: none; background: transparent;
    color: rgba(255,255,255,0.5); font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; font-family: 'DM Sans', sans-serif;
  }
  .counter button:hover { color: #fff; }
  .counter span {
    min-width: 32px; text-align: center; font-size: 14px; font-weight: 600; color: #fff;
  }

  /* Toggle */
  .toggle-btn {
    width: 100%; padding: 12px 16px; border-radius: 10;
    border: 1px solid rgba(255,255,255,0.08); background: rgba(255,255,255,0.02);
    cursor: pointer; display: flex; align-items: center; justify-content: space-between;
    transition: all 0.2s; text-align: left;
  }
  .toggle-btn.on { border-color: rgba(255,255,255,0.4); background: rgba(255,255,255,0.06); }
  .toggle-label { font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.5); }
  .toggle-btn.on .toggle-label { color: #fff; }
  .toggle-desc { font-size: 11px; color: rgba(255,255,255,0.3); }
  .toggle-track {
    width: 40px; height: 22px; border-radius: 11px;
    background: rgba(255,255,255,0.12); position: relative; transition: background 0.2s; flex-shrink: 0;
  }
  .toggle-btn.on .toggle-track { background: #fff; }
  .toggle-knob {
    width: 16px; height: 16px; border-radius: 8px;
    background: rgba(255,255,255,0.3); position: absolute; top: 3px; left: 3px; transition: all 0.2s;
  }
  .toggle-btn.on .toggle-knob { background: #0A0A0C; left: 21px; }

  /* Package cards */
  .pkg-grid { display: flex; gap: 8px; padding: 0 16px; flex-wrap: wrap; }
  .pkg-card {
    flex: 1; min-width: 140px; padding: 16px 14px; border-radius: 12;
    border: 1px solid rgba(255,255,255,0.08); background: rgba(255,255,255,0.02);
    cursor: pointer; text-align: left; transition: all 0.2s;
  }
  .pkg-card.selected { border: 1.5px solid rgba(255,255,255,0.5); background: rgba(255,255,255,0.07); }
  .pkg-name { font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.6); }
  .pkg-card.selected .pkg-name { color: #fff; }
  .pkg-price { font-size: 22px; font-weight: 700; color: #fff; margin: 6px 0 4px; font-family: 'Playfair Display', serif; }
  .pkg-desc { font-size: 11px; color: rgba(255,255,255,0.35); }

  /* Photo calc */
  .photo-calc {
    padding: 16px; margin: 0 16px; border-radius: 12;
    background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
  }
  .photo-result {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 12px; border-radius: 8; background: rgba(255,255,255,0.04); margin-top: 12px;
  }
  .photo-result-qty { font-size: 12px; color: rgba(255,255,255,0.5); }
  .photo-result-price { font-size: 16px; font-weight: 700; color: #fff; font-family: 'Playfair Display', serif; }
  .photo-tiers { margin-top: 10px; display: flex; gap: 6px; flex-wrap: wrap; }
  .photo-tier {
    font-size: 10px; color: rgba(255,255,255,0.3); padding: 3px 8px;
    border-radius: 6px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05);
  }

  /* Summary */
  .summary-title {
    font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase;
    color: rgba(255,255,255,0.3); margin-bottom: 16px; font-weight: 600;
  }
  .summary-line {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 5px 0; font-size: 13px;
  }
  .summary-line-label { color: rgba(255,255,255,0.55); flex: 1; padding-right: 12px; font-size: 12px; line-height: 1.4; }
  .summary-line-label.green { color: #6ee77a; }
  .summary-line-amount { font-weight: 600; white-space: nowrap; color: #fff; }
  .summary-line-amount.green { color: #6ee77a; }
  .summary-tag { font-size: 9px; color: rgba(255,255,255,0.25); margin-left: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
  .summary-divider { border-top: 1px solid rgba(255,255,255,0.08); margin: 16px 0; padding-top: 12px; }
  .summary-total-row {
    border-top: 1px solid rgba(255,255,255,0.12); padding-top: 16px; margin-top: 8px;
    display: flex; justify-content: space-between; align-items: baseline;
  }
  .summary-total-label { font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.6); }
  .summary-total-amount { font-size: 28px; font-weight: 700; color: #fff; font-family: 'Playfair Display', serif; }
  .summary-footnote { font-size: 11px; color: rgba(255,255,255,0.3); margin-top: 6px; text-align: right; }
  .summary-empty { color: rgba(255,255,255,0.25); font-size: 13px; margin-top: 32px; text-align: center; line-height: 1.6; }
  .summary-footer {
    margin-top: auto; padding-top: 24px;
  }
  .summary-footer-inner {
    font-size: 10px; color: rgba(255,255,255,0.2); line-height: 1.5;
    border-top: 1px solid rgba(255,255,255,0.05); padding-top: 14px;
  }
  .summary-footer-inner strong { color: rgba(255,255,255,0.35); }

  /* Responsive */
  @media (max-width: 720px) {
    .main { flex-direction: column; }
    .services { max-height: none; overflow: visible; }
    .summary-panel {
      width: 100%; min-width: auto; border-left: none;
      border-top: 1px solid rgba(255,255,255,0.06);
      position: static; max-height: none;
    }
    .pkg-grid { flex-direction: column; }
    .pkg-card { min-width: auto; }
  }

  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="header">
  <div class="header-sub">AG Visuals · Atlanta</div>
  <h1>Pricing Calculator</h1>
  <div class="header-note">Internal use only</div>
</div>

<div class="tabs">
  <button class="tab-btn active" data-tab="real-estate">Real Estate</button>
  <button class="tab-btn" data-tab="brands">Brands</button>
</div>

<div class="main">
  <div class="services">

    <!-- ═══════ REAL ESTATE ═══════ -->
    <div id="tab-real-estate">
      <div style="padding:16px 16px 0">
        <button class="toggle-btn" id="partner-toggle">
          <div>
            <div class="toggle-label">AG Visuals Partner</div>
            <div class="toggle-desc">10% off all services (excl. websites)</div>
          </div>
          <div class="toggle-track"><div class="toggle-knob"></div></div>
        </button>
      </div>

      <div class="section-label">Packages</div>
      <div class="pkg-grid" id="pkg-grid"></div>

      <div class="section-label">Agent Portrait Session</div>
      <div id="re-portrait-rows"></div>

      <div class="section-label">Listing Photography</div>
      <div id="re-photo-rows"></div>

      <div class="section-label">Video</div>
      <div id="re-video-rows"></div>

      <div class="section-label">Add-ons & Extras</div>
      <div id="re-addon-rows"></div>

      <div class="section-label">Website Development · no discount</div>
      <div id="re-web-rows"></div>
    </div>

    <!-- ═══════ BRANDS ═══════ -->
    <div id="tab-brands" class="hidden">
      <div style="padding:16px 16px 0">
        <button class="toggle-btn" id="retainer-toggle">
          <div>
            <div class="toggle-label">Retainer Client</div>
            <div class="toggle-desc">25% off all services (excl. websites)</div>
          </div>
          <div class="toggle-track"><div class="toggle-knob"></div></div>
        </button>
      </div>

      <div class="section-label">Photography</div>
      <div id="brand-photo-calc"></div>

      <div class="section-label">Video</div>
      <div id="br-video-rows"></div>

      <div class="section-label">Shooting & Events</div>
      <div id="br-extras-rows"></div>

      <div class="section-label">Website Development · no discount</div>
      <div id="br-web-rows"></div>
    </div>

  </div>

  <div class="summary-panel" id="summary-panel"></div>
</div>

<script>
// ─── STATE ───
const state = {
  tab: 'real-estate',
  partnerDiscount: false,
  isRetainer: false,
  qtys: {},
  selectedPkgs: {},
  brandPhotoQty: 0,
};

// ─── DATA ───
const RE_PACKAGES = [
  { id:'pkg-essentials', name:'The Essentials', price:320, desc:'Photos + drone' },
  { id:'pkg-sophisticated', name:'The Sophisticated', price:600, desc:'Photos, reel, drone, twilight, 3D tour' },
  { id:'pkg-pinnacle', name:'The Pinnacle', price:900, desc:'60 photos, cinematic video, drone, listing website' },
  { id:'pkg-spotlight', name:'The Spotlight', price:2500, desc:'Full luxury media production' },
];
const RE_PORTRAIT = [
  { id:'re-portrait', name:'Agent portrait session', price:250, unit:'10–15 photos' },
];
const RE_PHOTOGRAPHY = [
  { id:'re-photo-sm', name:'Listing photography · 0–2,000 sqft', price:250, unit:'per listing' },
  { id:'re-photo-md', name:'Listing photography · 2,000–4,000 sqft', price:300, unit:'per listing' },
  { id:'re-photo-lg', name:'Listing photography · 4,000+ sqft', price:380, unit:'per listing' },
  { id:'re-twilight', name:'Twilight photography add-on', price:150, unit:'10 photos' },
  { id:'re-vtwilight', name:'Virtual twilight add-on', price:30, unit:'per photo' },
];
const RE_VIDEO = [
  { id:'re-vreel', name:'Video reel · property only', price:300, unit:'per video' },
  { id:'re-vreel-agent', name:'Video reel · agent on camera', price:380, unit:'per video' },
  { id:'re-cine', name:'Cinematic video · horizontal', price:500, unit:'per video' },
  { id:'re-cine-agent', name:'Cinematic video · with agent', price:600, unit:'per video' },
  { id:'re-short', name:'Vertical short-form reel', price:150, unit:'IG / TikTok / Reels' },
  { id:'re-brand-comm', name:'Brand commercial', price:700, unit:'scripted production' },
  { id:'re-testimonial', name:'Testimonial video', price:250, unit:'60–90 sec cut' },
];
const RE_ADDONS = [
  { id:'re-3d', name:'3D tour · Zillow', price:200, unit:'' },
  { id:'re-floor', name:'2D floor plan', price:100, unit:'' },
  { id:'re-sameday', name:'Same-day delivery', price:100, unit:'' },
  { id:'re-propweb-tpl', name:'Property website · template', price:100, unit:'' },
  { id:'re-propweb-dyn', name:'Property website · dynamic', price:200, unit:'' },
];
const RE_WEBSITES = [
  { id:'re-web-tpl', name:'Website dev · agent / small team', price:1500, unit:'from template', noDiscount:true },
  { id:'re-web-custom', name:'Website dev · custom', price:3000, unit:'', noDiscount:true },
  { id:'re-web-full', name:'Website dev · custom + assets', price:3800, unit:'includes video & photo', noDiscount:true },
];
const BR_VIDEO = [
  { id:'br-vreel', name:'Video reel · commercial / showcase', price:300, unit:'1h shoot · social media' },
  { id:'br-vreel-people', name:'Video reel · people on camera', price:380, unit:'1h shoot · event / social' },
  { id:'br-cine', name:'Cinematic video commercial', price:500, unit:'up to 2h shoot' },
  { id:'br-brand-comm', name:'Brand commercial', price:700, unit:'up to 4h · scripted' },
  { id:'br-testimonial', name:'Testimonial video', price:250, unit:'30min shoot · one take' },
  { id:'br-quick', name:'Quick social media videos', price:150, unit:'10–20 sec each · min order' },
  { id:'br-construction', name:'Construction progress documentation', price:350, unit:'per visit · photos + clip' },
];
const BR_EXTRAS = [
  { id:'br-hourly', name:'Shooting hourly · no edition', price:80, unit:'per hour' },
  { id:'br-event', name:'Shooting event / day · with edition', price:1000, unit:'full day' },
];
const BR_WEBSITES = [
  { id:'br-web-custom', name:'Website dev · custom', price:3000, unit:'', noDiscount:true },
  { id:'br-web-full', name:'Website dev · custom + assets', price:3800, unit:'includes video & photo', noDiscount:true },
];

// ─── HELPERS ───
function getQty(id) { return state.qtys[id] || 0; }
function setQty(id, v) { state.qtys[id] = Math.max(0, v); render(); }

function brandPhotoPrice(qty) {
  if (qty <= 0) return 0;
  if (qty <= 15) return Math.max(250, Math.round(qty * 16.6));
  if (qty <= 25) {
    const pp = 250/15 + ((350/25 - 250/15) * (qty - 15)) / (25 - 15);
    return Math.round(qty * pp);
  }
  return qty * 10;
}

function fmt(n) { return n.toLocaleString(); }

// ─── RENDER FUNCTIONS ───
function makeCounter(id, value) {
  return `<div class="counter">
    <button onclick="setQty('${id}', ${value - 1})">−</button>
    <span>${value}</span>
    <button onclick="setQty('${id}', ${value + 1})">+</button>
  </div>`;
}

function makeRow(item) {
  const q = getQty(item.id);
  const active = q > 0 ? ' active' : '';
  const priceLabel = '$' + item.price + (item.unit ? ' · ' + item.unit : '');
  return `<div class="svc-row${active}">
    <div style="flex:1;min-width:0">
      <div class="svc-name">${item.name}</div>
      <div class="svc-price">${priceLabel}</div>
    </div>
    ${makeCounter(item.id, q)}
  </div>`;
}

function makeRows(container, items) {
  document.getElementById(container).innerHTML = items.map(makeRow).join('');
}

function makePkgGrid() {
  document.getElementById('pkg-grid').innerHTML = RE_PACKAGES.map(p => {
    const sel = state.selectedPkgs[p.id] ? ' selected' : '';
    return `<button class="pkg-card${sel}" onclick="togglePkg('${p.id}')">
      <div class="pkg-name">${p.name}</div>
      <div class="pkg-price">$${fmt(p.price)}</div>
      <div class="pkg-desc">${p.desc}</div>
    </button>`;
  }).join('');
}

function makePhotoCalc() {
  const q = state.brandPhotoQty;
  const tierLabel = q <= 15 ? '$16.60/photo · min $250' : q <= 25 ? 'Scaled rate' : '$10/photo';
  let result = '';
  if (q > 0) {
    result = `<div class="photo-result">
      <span class="photo-result-qty">${q} photo${q !== 1 ? 's' : ''}</span>
      <span class="photo-result-price">$${fmt(brandPhotoPrice(q))}</span>
    </div>`;
  }
  document.getElementById('brand-photo-calc').innerHTML = `
    <div class="photo-calc">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <div>
          <div class="svc-name" style="color:${q > 0 ? '#fff' : 'rgba(255,255,255,0.7)'}">Brand photography</div>
          <div class="svc-price">${tierLabel}</div>
        </div>
        <div class="counter">
          <button onclick="setBrandPhoto(${q - 1})">−</button>
          <span>${q}</span>
          <button onclick="setBrandPhoto(${q + 1})">+</button>
        </div>
      </div>
      ${result}
      <div class="photo-tiers">
        <span class="photo-tier">10–15 photos</span>
        <span class="photo-tier">15–25 photos</span>
        <span class="photo-tier">50+ photos</span>
      </div>
    </div>`;
}

function togglePkg(id) { state.selectedPkgs[id] = !state.selectedPkgs[id]; render(); }
function setBrandPhoto(v) { state.brandPhotoQty = Math.max(0, v); render(); }

// ─── SUMMARY ───
function summaryLine(label, amount, tag, highlight) {
  const cls = highlight ? ' green' : '';
  const tagHtml = tag ? `<span class="summary-tag">${tag}</span>` : '';
  const amtStr = amount < 0 ? `−$${fmt(Math.abs(amount))}` : `$${fmt(amount)}`;
  return `<div class="summary-line">
    <span class="summary-line-label${cls}">${label}${tagHtml}</span>
    <span class="summary-line-amount${cls}">${amtStr}</span>
  </div>`;
}

function renderSummary() {
  const panel = document.getElementById('summary-panel');
  let html = '<div class="summary-title">Quote Summary</div>';

  if (state.tab === 'real-estate') {
    let base = 0, noDisc = 0, lines = '';
    RE_PACKAGES.forEach(p => {
      if (state.selectedPkgs[p.id]) { base += p.price; lines += summaryLine(p.name, p.price); }
    });
    [...RE_PORTRAIT, ...RE_PHOTOGRAPHY, ...RE_VIDEO, ...RE_ADDONS].forEach(item => {
      const q = getQty(item.id);
      if (q > 0) { base += q * item.price; lines += summaryLine(`${item.name} × ${q}`, q * item.price); }
    });
    RE_WEBSITES.forEach(item => {
      const q = getQty(item.id);
      if (q > 0) { noDisc += q * item.price; lines += summaryLine(`${item.name} × ${q}`, q * item.price, 'no discount'); }
    });

    if (base + noDisc === 0) {
      html += '<div class="summary-empty">Add services or packages<br>to build your quote.</div>';
    } else {
      html += lines;
      html += '<div class="summary-divider">';
      html += summaryLine('Subtotal (services)', base);
      if (noDisc > 0) html += summaryLine('Website development', noDisc);
      if (state.partnerDiscount && base > 0) html += summaryLine('Partner discount (10%)', -Math.round(base * 0.10), '', true);
      html += '</div>';
      const total = Math.round(base * (state.partnerDiscount ? 0.9 : 1)) + noDisc;
      html += `<div class="summary-total-row">
        <span class="summary-total-label">Total</span>
        <span class="summary-total-amount">$${fmt(total)}</span>
      </div>`;
      if (state.partnerDiscount) html += '<div class="summary-footnote">AG Visuals Partner · 10% off applied</div>';
    }
    html += `<div class="summary-footer"><div class="summary-footer-inner">
      <strong>Partner discount:</strong><br>AG Visuals Partners receive 10% off all services.<br>Website development is always full price.
    </div></div>`;

  } else {
    let base = 0, noDisc = 0, lines = '';
    const bpq = state.brandPhotoQty;
    if (bpq > 0) { const bp = brandPhotoPrice(bpq); base += bp; lines += summaryLine(`Brand photography × ${bpq}`, bp); }
    [...BR_VIDEO, ...BR_EXTRAS].forEach(item => {
      const q = getQty(item.id);
      if (q > 0) { base += q * item.price; lines += summaryLine(`${item.name} × ${q}`, q * item.price); }
    });
    BR_WEBSITES.forEach(item => {
      const q = getQty(item.id);
      if (q > 0) { noDisc += q * item.price; lines += summaryLine(`${item.name} × ${q}`, q * item.price, 'no discount'); }
    });

    if (base + noDisc === 0) {
      html += '<div class="summary-empty">Add services<br>to build your quote.</div>';
    } else {
      html += lines;
      html += '<div class="summary-divider">';
      html += summaryLine('Subtotal (services)', base);
      if (noDisc > 0) html += summaryLine('Website development', noDisc);
      if (state.isRetainer && base > 0) html += summaryLine('Retainer discount (25%)', -Math.round(base * 0.25), '', true);
      html += '</div>';
      const total = Math.round(base * (state.isRetainer ? 0.75 : 1)) + noDisc;
      html += `<div class="summary-total-row">
        <span class="summary-total-label">Total</span>
        <span class="summary-total-amount">$${fmt(total)}</span>
      </div>`;
      if (state.isRetainer) html += '<div class="summary-footnote">Retainer client · 25% off applied</div>';
      else html += '<div class="summary-footnote" style="color:rgba(255,255,255,0.25)">Standard pricing · no retainer</div>';
    }
    html += `<div class="summary-footer"><div class="summary-footer-inner">
      <strong>Retainer vs. Standard:</strong><br>Retainer clients receive 25% off all services.<br>Website development is always full price.
    </div></div>`;
  }

  panel.innerHTML = html;
}

// ─── FULL RENDER ───
function render() {
  // Tabs
  document.getElementById('tab-real-estate').classList.toggle('hidden', state.tab !== 'real-estate');
  document.getElementById('tab-brands').classList.toggle('hidden', state.tab !== 'brands');

  // Toggle states
  document.getElementById('partner-toggle').classList.toggle('on', state.partnerDiscount);
  document.getElementById('retainer-toggle').classList.toggle('on', state.isRetainer);

  // Real estate
  makePkgGrid();
  makeRows('re-portrait-rows', RE_PORTRAIT);
  makeRows('re-photo-rows', RE_PHOTOGRAPHY);
  makeRows('re-video-rows', RE_VIDEO);
  makeRows('re-addon-rows', RE_ADDONS);
  makeRows('re-web-rows', RE_WEBSITES);

  // Brands
  makePhotoCalc();
  makeRows('br-video-rows', BR_VIDEO);
  makeRows('br-extras-rows', BR_EXTRAS);
  makeRows('br-web-rows', BR_WEBSITES);

  renderSummary();
}

// ─── EVENTS ───
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    state.tab = btn.dataset.tab;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  });
});

document.getElementById('partner-toggle').addEventListener('click', () => {
  state.partnerDiscount = !state.partnerDiscount; render();
});
document.getElementById('retainer-toggle').addEventListener('click', () => {
  state.isRetainer = !state.isRetainer; render();
});

// Initial render
render();
</script>
</body>
</html>
